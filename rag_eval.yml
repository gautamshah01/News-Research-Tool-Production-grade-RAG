name: RAG Evaluation Pipeline

# Runs on every PR and on pushes to main.
# A failing metric (below threshold) blocks the merge.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  rag-eval:
    name: RAG Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run RAG evaluation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python evaluate.py

      - name: Upload evaluation report
        if: always()   # upload even on failure so we can inspect regressions
        uses: actions/upload-artifact@v4
        with:
          name: rag-eval-report
          path: rag_eval_report.json
          retention-days: 30

      # Optional: post metric summary as a PR comment
      - name: Comment metrics on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('rag_eval_report.json', 'utf8'));
            const avg = report.averages;
            const passed = report.all_passed;
            const body = [
              `## RAG Evaluation Results ${passed ? '✅' : '❌'}`,
              '',
              '| Metric | Score | Threshold |',
              '|--------|-------|-----------|',
              `| Citation rate | ${(avg.citation_rate * 100).toFixed(1)}% | ${(report.thresholds.citation_rate * 100).toFixed(0)}% |`,
              `| Context precision | ${(avg.context_precision * 100).toFixed(1)}% | ${(report.thresholds.context_precision * 100).toFixed(0)}% |`,
              `| Faithfulness | ${(avg.faithfulness * 100).toFixed(1)}% | ${(report.thresholds.faithfulness * 100).toFixed(0)}% |`,
              '',
              passed
                ? '**All metrics above threshold. Safe to merge.**'
                : '**⚠️ One or more metrics below threshold. Do not merge.**',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
